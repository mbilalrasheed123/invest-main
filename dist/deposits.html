<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>
        Deposits - InvestWise
    </title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script>tailwind.config = { darkMode: "class", theme: { extend: { colors: { "primary": "#13ec5b", "background-dark": "#102216" }, fontFamily: { "display": ["Inter"] }, borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" } } } }</script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-background-dark text-slate-100 font-display min-h-screen">
    <!-- Navigation Partial -->
<header
    class="flex items-center justify-between whitespace-nowrap border-b border-primary/20 px-6 lg:px-20 py-4 bg-[#102216] sticky top-0 z-50">
    <div class="flex items-center gap-8">
        <a href="dashboard.html" class="flex items-center gap-3 text-primary">
            <div class="size-8 rounded-lg flex items-center justify-center text-background-dark"
                style="background:linear-gradient(135deg,#13ec5b,#0bda43)">
                <span class="material-symbols-outlined font-bold">account_balance_wallet</span>
            </div>
            <h2 class="text-slate-100 text-xl font-black leading-tight tracking-tight">InvestAuto</h2>
        </a>
        <nav class="hidden md:flex items-center gap-8 ml-4">
            <a class="text-slate-400 hover:text-primary text-sm font-semibold pb-1 transition-colors"
                href="dashboard.html">Dashboard</a>
            <a class="text-slate-400 hover:text-primary text-sm font-medium pb-1 transition-colors"
                href="plans.html">Investments</a>
            <a class="text-primary border-b-2 border-primary text-sm font-medium pb-1 transition-colors"
                href="deposits.html">Deposits</a>
            <a class="text-slate-400 hover:text-primary text-sm font-medium pb-1 transition-colors"
                href="withdrawals.html">Withdraw</a>
            <a class="text-slate-400 hover:text-primary text-sm font-medium pb-1 transition-colors"
                href="settings.html">Settings</a>
        </nav>
    </div>
    <div class="flex items-center gap-3">
        <span class="text-xs font-bold text-slate-100 hidden sm:inline">
            Bilal Ahmed
        </span>
        <a href="#" class="logout-btn text-slate-400 hover:text-red-500 transition-colors"><span
                class="material-symbols-outlined">logout</span></a>
    </div>
</header>
        <main class="px-6 lg:px-20 py-8 max-w-[1440px] mx-auto">
            <h1 class="text-3xl font-black tracking-tight mb-2">Deposits</h1>
            <p class="text-slate-400 mb-8">Submit a deposit request and upload payment proof.</p>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-1">
                    <div class="rounded-xl border border-primary/10 bg-primary/5 p-6">
                        <h3 class="text-lg font-bold mb-4">New Deposit</h3>
                        <form id="depositForm" enctype="multipart/form-data" class="space-y-4">
                            <div><label class="text-sm font-medium text-slate-300 mb-1 block">Amount ($)</label>
                                <input
                                    class="w-full rounded-lg bg-white/5 border border-primary/20 px-4 py-3 text-sm focus:ring-primary focus:border-primary placeholder:text-slate-500"
                                    name="amount" type="number" min="1" placeholder="Enter deposit amount" required />
                            </div>
                            <div><label class="text-sm font-medium text-slate-300 mb-1 block">Payment Method</label>
                                <select name="paymentMethod"
                                    class="w-full rounded-lg bg-white/5 border border-primary/20 px-4 py-3 text-sm focus:ring-primary focus:border-primary text-slate-300">
                                    <option>Bank Transfer</option>
                                    <option>Crypto</option>
                                    <option>Mobile Money</option>
                                </select>
                            </div>
                            <div><label class="text-sm font-medium text-slate-300 mb-1 block">Payment Proof</label>
                                <input
                                    class="w-full rounded-lg bg-white/5 border border-primary/20 px-4 py-2 text-sm file:mr-4 file:py-1 file:px-3 file:rounded file:border-0 file:text-sm file:font-bold file:bg-primary file:text-background-dark"
                                    name="paymentProof" type="file" accept="image/*,.pdf" />
                            </div>
                            <button type="submit"
                                class="w-full bg-primary text-background-dark py-3 rounded-lg font-bold text-sm">Submit
                                Deposit</button>
                        </form>
                    </div>
                </div>
                <div class="lg:col-span-2">
                    <div class="rounded-xl border border-primary/10 bg-primary/5 p-6">
                        <h3 class="text-lg font-bold mb-4">Deposit History</h3>
                        
                                <div class="overflow-x-auto">
                                    <table class="w-full text-left text-sm">
                                        <thead class="text-xs text-slate-400 uppercase border-b border-primary/10">
                                            <tr>
                                                <th class="py-3 px-2">Amount</th>
                                                <th class="py-3 px-2">Method</th>
                                                <th class="py-3 px-2">Status</th>
                                                <th class="py-3 px-2">Date</th>
                                            </tr>
                                        </thead>
                                        <tbody class="divide-y divide-primary/5">
                                            
                                                <tr class="hover:bg-primary/5">
                                                    <td class="py-3 px-2 font-bold">$20,000
                                                    </td>
                                                    <td class="py-3 px-2">
                                                        Bank Transfer
                                                    </td>
                                                    <td class="py-3 px-2"><span
                                                            class="px-2 py-1 rounded-full text-xs font-bold bg-primary/10 text-primary">
                                                            approved
                                                        </span></td>
                                                    <td class="py-3 px-2 text-slate-400">
                                                        2/27/2026
                                                    </td>
                                                </tr>
                                                
                                                <tr class="hover:bg-primary/5">
                                                    <td class="py-3 px-2 font-bold">$30,000
                                                    </td>
                                                    <td class="py-3 px-2">
                                                        Crypto
                                                    </td>
                                                    <td class="py-3 px-2"><span
                                                            class="px-2 py-1 rounded-full text-xs font-bold bg-primary/10 text-primary">
                                                            approved
                                                        </span></td>
                                                    <td class="py-3 px-2 text-slate-400">
                                                        2/23/2026
                                                    </td>
                                                </tr>
                                                
                                        </tbody>
                                    </table>
                                </div>
                                
                    </div>
                </div>
            </div>
        </main>
        <script src="js/main.js"></script>
</body>

</html>
