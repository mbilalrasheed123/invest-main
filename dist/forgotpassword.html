<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>
        Forgot Password - InvestWise
    </title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>tailwind.config = { darkMode: "class", theme: { extend: { colors: { "primary": "#137fec", "primary-dark": "#0f65bd", "background-dark": "#101922", "surface-dark": "#1c2127", "border-dark": "#3b4754", "text-secondary": "#9dabb9" }, fontFamily: { "display": ["Inter", "sans-serif"] }, borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" } } } }</script>
    <style>
        .glass-panel {
            background: rgba(28, 33, 39, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(59, 71, 84, 0.5);
        }
    </style>
</head>

<body
    class="bg-background-dark font-display text-slate-100 antialiased min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-[480px]">
        <div class="glass-panel p-8 rounded-xl shadow-2xl">
            <div class="flex flex-col gap-2 text-center mb-8">
                <span class="material-symbols-outlined text-primary text-4xl mx-auto">lock_reset</span>
                <h2 class="text-white text-3xl font-bold tracking-tight">Forgot Password</h2>
                <p class="text-text-secondary text-sm">Enter your email and we'll send you a reset link.</p>
            </div>
            <form id="forgotPasswordForm" class="flex flex-col gap-5">
                <div class="flex flex-col gap-2">
                    <label class="text-slate-200 text-sm font-medium">Email Address</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-text-secondary"><span
                                class="material-symbols-outlined text-[20px]">mail</span></span>
                        <input
                            class="form-input flex w-full rounded-lg text-white border border-border-dark bg-surface-dark focus:border-primary focus:ring-1 focus:ring-primary placeholder:text-text-secondary pl-11 pr-4 py-3 text-sm"
                            name="email" placeholder="john.doe@example.com" type="email" required />
                    </div>
                </div>
                <button
                    class="flex w-full items-center justify-center rounded-lg bg-primary py-3 px-4 text-sm font-bold text-white shadow-lg shadow-primary/20 hover:bg-primary-dark active:scale-[0.98] transition-all"
                    type="submit">Send Reset Link</button>
                <p class="text-center text-sm text-text-secondary">Remember your password? <a
                        class="font-medium text-white hover:text-primary transition-colors" href="login.html">Log in</a></p>
            </form>
        </div>
    </div>
    <script src="js/main.js"></script>
</body>

</html>
